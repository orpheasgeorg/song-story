<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASYNC STRESS TEST - 150 REQUESTS</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            background-image:
                    radial-gradient(circle at 20% 80%, rgba(0, 255, 255, 0.05) 0%, transparent 50%),
                    radial-gradient(circle at 80% 20%, rgba(255, 0, 255, 0.05) 0%, transparent 50%);
            min-height: 100vh;
            font-family: 'Press Start 2P', monospace;
            padding: 20px;
            color: #00ffff;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            padding: 30px;
            border: 4px solid #00ffff;
            margin-bottom: 30px;
            background: #0d0d0d;
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.1);
            position: relative;
            animation: borderPulse 2s ease-in-out infinite;
        }

        @keyframes borderPulse {
            0%, 100% { box-shadow: 0 0 20px rgba(0, 255, 255, 0.2), 0 0 60px rgba(255, 0, 255, 0.1); }
            50% { box-shadow: 0 0 40px rgba(255, 0, 255, 0.2), 0 0 80px rgba(0, 255, 255, 0.1); }
        }

        h1 {
            font-size: 1.5rem;
            background: linear-gradient(45deg, #ff00ff, #00ffff, #ff00ff);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: rainbowText 3s ease-in-out infinite;
            margin-bottom: 15px;
        }

        @keyframes rainbowText {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .stat-box {
            background: #111111;
            border: 3px solid #ff00ff;
            padding: 15px;
            text-align: center;
        }

        .stat-label {
            font-size: 0.4rem;
            color: #ff00ff;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }

        .stat-value {
            font-size: 1.2rem;
            color: #00ffff;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
        }

        .stat-value.green { color: #00ff00; text-shadow: 0 0 20px rgba(0, 255, 0, 0.3); }
        .stat-value.red { color: #ff00ff; text-shadow: 0 0 20px rgba(255, 0, 255, 0.3); }
        .stat-value.yellow { color: #ffff00; text-shadow: 0 0 20px rgba(255, 255, 0, 0.3); }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 20px 0;
        }

        .btn {
            background: linear-gradient(45deg, #ff00ff, #00ffff);
            border: none;
            padding: 15px 30px;
            font-family: 'Press Start 2P', monospace;
            font-size: 0.6rem;
            color: #000;
            cursor: pointer;
            transition: all 0.3s;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
            position: relative;
            overflow: hidden;
        }

        .btn:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(255, 0, 255, 0.4);
        }

        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
        }

        .btn-danger {
            background: linear-gradient(45deg, #ff0000, #ff00ff);
        }

        .btn-clear {
            background: linear-gradient(45deg, #666, #888);
        }

        .progress-container {
            background: #111111;
            border: 3px solid #ff00ff;
            padding: 5px;
            margin: 20px 0;
            height: 30px;
            position: relative;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #ff00ff, #00ffff, #ff00ff);
            background-size: 200% 100%;
            animation: progressGlow 1s linear infinite;
            transition: width 0.3s ease;
            width: 0%;
            position: relative;
        }

        @keyframes progressGlow {
            0% { background-position: 0% 0%; }
            100% { background-position: 200% 0%; }
        }

        .progress-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 0.5rem;
            color: #000;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            z-index: 2;
            font-weight: bold;
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
            margin-top: 20px;
            max-height: 600px;
            overflow-y: auto;
            padding: 10px;
            border: 3px solid #ff00ff;
            background: #0a0a0a;
        }

        .results-grid::-webkit-scrollbar {
            width: 10px;
            background: #0d0d0d;
        }

        .results-grid::-webkit-scrollbar-track {
            background: #0d0d0d;
            border: 2px solid #ff00ff;
        }

        .results-grid::-webkit-scrollbar-thumb {
            background: linear-gradient(45deg, #00ffff, #ff00ff);
            border: 2px solid #00ffff;
        }

        .request-card {
            background: #111111;
            border: 3px solid #ff00ff;
            padding: 10px;
            font-size: 0.35rem;
            animation: fadeIn 0.3s ease-out;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .request-card:hover {
            transform: scale(1.05);
            z-index: 2;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.2);
        }

        .request-card .id {
            color: #ffff00;
            font-size: 0.5rem;
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }

        .request-card .status {
            display: inline-block;
            padding: 2px 8px;
            margin: 3px 0;
            font-size: 0.3rem;
        }

        .request-card .status.pending {
            color: #ffff00;
            border: 2px solid #ffff00;
            animation: pulse 1s ease-in-out infinite;
        }

        .request-card .status.success {
            color: #00ff00;
            border: 2px solid #00ff00;
        }

        .request-card .status.error {
            color: #ff00ff;
            border: 2px solid #ff00ff;
            animation: errorGlitch 0.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        @keyframes errorGlitch {
            0%, 100% { transform: translate(0); }
            25% { transform: translate(-2px, 1px); }
            50% { transform: translate(2px, -1px); }
            75% { transform: translate(-1px, 2px); }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .request-card .time {
            display: block;
            margin-top: 5px;
            color: #00ffff;
            font-size: 0.3rem;
        }

        .request-card .time.fast { color: #00ff00; }
        .request-card .time.medium { color: #ffff00; }
        .request-card .time.slow { color: #ff6600; }
        .request-card .time.very-slow { color: #ff00ff; }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: #666;
            font-size: 0.6rem;
            border: 3px dashed #ff00ff;
        }

        .chart-container {
            margin: 20px 0;
            padding: 20px;
            background: #0d0d0d;
            border: 3px solid #00ffff;
            max-height: 300px;
            overflow: hidden;
        }

        .chart-bars {
            display: flex;
            align-items: flex-end;
            gap: 3px;
            height: 200px;
            padding: 10px 0;
        }

        .chart-bar {
            flex: 1;
            background: linear-gradient(180deg, #00ffff, #ff00ff);
            min-height: 2px;
            transition: height 0.5s ease;
            position: relative;
            min-width: 3px;
        }

        .chart-bar:hover {
            opacity: 0.7;
        }

        .chart-bar .bar-label {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.2rem;
            color: #00ffff;
            display: none;
        }

        .chart-bar:hover .bar-label {
            display: block;
        }

        @media (max-width: 768px) {
            .results-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }
            h1 { font-size: 1rem; }
            .stat-value { font-size: 0.9rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>⚡ ASYNC STRESS TEST ⚡</h1>
        <div style="font-size: 0.4rem; color: #ff00ff; margin-top: 10px;">
            150 REQUESTS • COMPLETABLEFUTURE • SPRING BOOT
        </div>

        <div class="controls">
            <button id="startBtn" class="btn">🚀 START 150 REQUESTS</button>
            <button id="clearBtn" class="btn btn-clear">🗑️ CLEAR</button>
        </div>

        <div class="stats-grid">
            <div class="stat-box">
                <div class="stat-label">TOTAL</div>
                <div class="stat-value" id="totalCount">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">COMPLETED</div>
                <div class="stat-value green" id="completedCount">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">PENDING</div>
                <div class="stat-value yellow" id="pendingCount">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">ERRORS</div>
                <div class="stat-value red" id="errorCount">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">AVG (ms)</div>
                <div class="stat-value" id="avgTime">-</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">MIN (ms)</div>
                <div class="stat-value green" id="minTime">-</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">MAX (ms)</div>
                <div class="stat-value red" id="maxTime">-</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">TOTAL TIME</div>
                <div class="stat-value yellow" id="totalTime">-</div>
            </div>
        </div>

        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
            <div class="progress-text" id="progressText">0%</div>
        </div>
    </div>

    <div class="chart-container">
        <div style="font-size: 0.3rem; color: #666; text-align: center; margin-bottom: 10px;">
            RESPONSE TIME DISTRIBUTION (ms)
        </div>
        <div class="chart-bars" id="chartBars"></div>
    </div>

    <div class="results-grid" id="resultsGrid">
        <div class="empty-state">🎮 PRESS "START 150 REQUESTS" TO BEGIN</div>
    </div>
</div>

<script>
    const API_BASE_URL = 'http://localhost:8080'; // ⚠️ ΑΛΛΑΞΕ ΜΕ ΤΟ URL ΣΟΥ
    const SEARCH_URL = `${API_BASE_URL}/api/v2/songs/search`;
    const TOTAL_REQUESTS = 150;

    // State
    let requests = [];
    let isRunning = false;
    let startTime = null;
    let completedRequests = 0;
    let errorRequests = 0;

    // DOM Elements
    const startBtn = document.getElementById('startBtn');
    const clearBtn = document.getElementById('clearBtn');
    const resultsGrid = document.getElementById('resultsGrid');
    const progressBar = document.getElementById('progressBar');
    const progressText = document.getElementById('progressText');

    const totalCount = document.getElementById('totalCount');
    const completedCount = document.getElementById('completedCount');
    const pendingCount = document.getElementById('pendingCount');
    const errorCount = document.getElementById('errorCount');
    const avgTime = document.getElementById('avgTime');
    const minTime = document.getElementById('minTime');
    const maxTime = document.getElementById('maxTime');
    const totalTime = document.getElementById('totalTime');
    const chartBars = document.getElementById('chartBars');

    // Error messages για διασκέδαση
    const errorMessages = [
        '💥 SERVER MELTDOWN',
        '🌀 DIMENSIONAL RIFT',
        '⚡ OVER 9000!',
        '👾 SPACE INVADERS',
        '🎮 GAME OVER',
        '🔥 MIXTAPE ON FIRE',
        '🕹️ JOYSTICK MALFUNCTION',
        '📼 VHS TAPE EATEN',
        '💾 FLOPPY DISK ERROR',
        '🎵 RECORD SKIPPED'
    ];

    function getRandomError() {
        return errorMessages[Math.floor(Math.random() * errorMessages.length)];
    }

    function getTimeCategory(ms) {
        if (ms < 1000) return 'fast';
        if (ms < 3000) return 'medium';
        if (ms < 5000) return 'slow';
        return 'very-slow';
    }

    function createRequestCard(index, status = 'pending') {
        const card = document.createElement('div');
        card.className = 'request-card';
        card.id = `request-${index}`;
        card.innerHTML = `
                <span class="id">#${index + 1}</span>
                <span class="status ${status}">${status.toUpperCase()}</span>
                <div style="font-size:0.3rem; color:#666; margin-top:3px;">${status === 'pending' ? '⏳ WAITING...' : '📡 SENT'}</div>
                <span class="time">⏱️ -</span>
            `;
        return card;
    }

    function updateStats() {
        const total = requests.length;
        const completed = requests.filter(r => r.status === 'success').length;
        const errors = requests.filter(r => r.status === 'error').length;
        const pending = total - completed - errors;

        totalCount.textContent = total;
        completedCount.textContent = completed;
        pendingCount.textContent = pending;
        errorCount.textContent = errors;

        const times = requests
            .filter(r => r.status === 'success' && r.time)
            .map(r => r.time);

        if (times.length > 0) {
            const avg = times.reduce((a, b) => a + b, 0) / times.length;
            const min = Math.min(...times);
            const max = Math.max(...times);

            avgTime.textContent = Math.round(avg);
            minTime.textContent = Math.round(min);
            maxTime.textContent = Math.round(max);
        }

        if (startTime && completed + errors === total) {
            const totalDuration = Date.now() - startTime;
            totalTime.textContent = totalDuration + 'ms';
        }

        // Progress
        const progress = ((completed + errors) / total * 100);
        progressBar.style.width = progress + '%';
        progressText.textContent = Math.round(progress) + '%';

        // Update chart
        updateChart();
    }

    function updateChart() {
        const times = requests
            .filter(r => r.status === 'success' && r.time)
            .map(r => r.time);

        if (times.length === 0) {
            chartBars.innerHTML = '<div style="text-align:center;width:100%;color:#666;font-size:0.3rem;padding:20px;">NO DATA YET</div>';
            return;
        }

        const maxTime = Math.max(...times);
        const buckets = 50;
        const histogram = new Array(buckets).fill(0);

        times.forEach(time => {
            const bucket = Math.min(Math.floor((time / maxTime) * buckets), buckets - 1);
            histogram[bucket]++;
        });

        const maxCount = Math.max(...histogram);

        chartBars.innerHTML = '';
        histogram.forEach((count, i) => {
            const bar = document.createElement('div');
            bar.className = 'chart-bar';
            const height = maxCount > 0 ? (count / maxCount) * 100 : 0;
            bar.style.height = Math.max(2, height) + '%';

            const timeRange = Math.round((i / buckets) * maxTime);
            bar.innerHTML = `<span class="bar-label">${timeRange}</span>`;

            if (count === 0) {
                bar.style.opacity = '0.1';
            }

            chartBars.appendChild(bar);
        });
    }

    async function sendRequest(index) {
        const card = document.getElementById(`request-${index}`);
        const timeSpan = card.querySelector('.time');
        const statusSpan = card.querySelector('.status');
        const detailSpan = card.querySelector('div');

        try {
            // Τυχαίο search query για ποικιλία
            const queries = [
                { title: 'Bohemian Rhapsody' },
                { artist: 'Queen' },
                { title: 'Imagine' },
                { artist: 'Beatles' },
                { album: 'Thriller' },
                { title: 'Like a Rolling Stone' },
                { artist: 'Nirvana' },
                { album: 'The Dark Side of the Moon' },
                { title: 'Hotel California' },
                { artist: 'Pink Floyd' }
            ];

            const query = queries[index % queries.length];
            const requestStart = Date.now();

            const response = await fetch(SEARCH_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(query)
            });

            const responseTime = Date.now() - requestStart;

            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }

            const data = await response.json();

            // Update card
            statusSpan.className = 'status success';
            statusSpan.textContent = '✅ SUCCESS';
            const timeClass = getTimeCategory(responseTime);
            timeSpan.className = `time ${timeClass}`;
            timeSpan.textContent = `⏱️ ${responseTime}ms`;
            detailSpan.textContent = `📀 ${data.length || 0} songs found`;

            // Update state
            const request = requests[index];
            request.status = 'success';
            request.time = responseTime;
            request.data = data;

            completedRequests++;

        } catch (error) {
            // Update card with error
            statusSpan.className = 'status error';
            statusSpan.textContent = '❌ ERROR';
            timeSpan.className = 'time very-slow';
            timeSpan.textContent = `⏱️ ${Date.now() - requestStart}ms`;
            detailSpan.textContent = getRandomError();

            // Update state
            const request = requests[index];
            request.status = 'error';
            request.time = Date.now() - requestStart;
            request.error = error.message;

            errorRequests++;
        }

        updateStats();
        checkCompletion();
    }

    function checkCompletion() {
        const total = requests.length;
        const completed = requests.filter(r => r.status === 'success').length;
        const errors = requests.filter(r => r.status === 'error').length;

        if (completed + errors === total) {
            isRunning = false;
            startBtn.disabled = false;
            startBtn.textContent = '🚀 RUN AGAIN';

            const totalDuration = Date.now() - startTime;
            totalTime.textContent = totalDuration + 'ms';

            // Show summary in console
            console.log('✅ === TEST COMPLETED ===');
            console.log(`Total: ${total}`);
            console.log(`Success: ${completed}`);
            console.log(`Errors: ${errors}`);
            console.log(`Total time: ${totalDuration}ms`);
            console.log(`Avg time: ${avgTime.textContent}ms`);
            console.log(`Min time: ${minTime.textContent}ms`);
            console.log(`Max time: ${maxTime.textContent}ms`);
        }
    }

    async function startTest() {
        if (isRunning) return;

        // Clear previous results
        clearResults();

        isRunning = true;
        startBtn.disabled = true;
        startBtn.textContent = '⏳ RUNNING...';

        startTime = Date.now();
        completedRequests = 0;
        errorRequests = 0;

        // Initialize requests
        for (let i = 0; i < TOTAL_REQUESTS; i++) {
            requests.push({
                index: i,
                status: 'pending',
                time: null,
                data: null,
                error: null
            });

            const card = createRequestCard(i, 'pending');
            resultsGrid.appendChild(card);
        }

        updateStats();

        // Send all requests in parallel
        console.log(`🚀 Sending ${TOTAL_REQUESTS} parallel requests...`);
        const promises = [];

        for (let i = 0; i < TOTAL_REQUESTS; i++) {
            promises.push(sendRequest(i));
        }

        // Wait for all to complete
        await Promise.allSettled(promises);

        // Final update
        checkCompletion();
    }

    function clearResults() {
        requests = [];
        resultsGrid.innerHTML = '';
        progressBar.style.width = '0%';
        progressText.textContent = '0%';

        totalCount.textContent = '0';
        completedCount.textContent = '0';
        pendingCount.textContent = '0';
        errorCount.textContent = '0';
        avgTime.textContent = '-';
        minTime.textContent = '-';
        maxTime.textContent = '-';
        totalTime.textContent = '-';

        chartBars.innerHTML = '<div style="text-align:center;width:100%;color:#666;font-size:0.3rem;padding:20px;">NO DATA YET</div>';

        startBtn.textContent = '🚀 START 150 REQUESTS';
        startBtn.disabled = false;
        isRunning = false;
    }

    // Event Listeners
    startBtn.addEventListener('click', startTest);
    clearBtn.addEventListener('click', clearResults);

    // Keyboard shortcut
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && e.ctrlKey) {
            startTest();
        }
        if (e.key === 'c' && e.ctrlKey) {
            clearResults();
        }
    });

    // Console instructions
    console.log('🎮 ASYNC STRESS TEST v2.0');
    console.log('📡 Backend URL:', API_BASE_URL);
    console.log('🔗 Endpoint:', SEARCH_URL);
    console.log('📊 Sending', TOTAL_REQUESTS, 'parallel requests');
    console.log('⌨️  Ctrl+Enter to start');
    console.log('⌨️  Ctrl+C to clear');

    // Auto-start with delay
    setTimeout(() => {
        console.log('🚀 Auto-starting in 1 second...');
        setTimeout(startTest, 1000);
    }, 500);
</script>
</body>
</html>
